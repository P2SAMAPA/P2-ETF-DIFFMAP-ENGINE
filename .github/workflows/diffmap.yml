name: DIFFMAP ETF Engine

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC (after your data update)
  workflow_dispatch:

jobs:
  run-diffmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: models/
          key: diffmap-models-${{ github.run_id }}
          restore-keys: |
            diffmap-models-

      - name: Run DIFFMAP pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python run.py

      - name: Commit output locally
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions"

          git add outputs/
          git commit -m "DIFFMAP daily run" || echo "No changes"
          git push
