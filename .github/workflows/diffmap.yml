name: DIFFMAP ETF Engine

on:
  schedule:
    - cron: "15 22 * * 1-5"
  workflow_dispatch:

jobs:
  run-diffmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub pandas-market-calendars

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: models/
          key: diffmap-models-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            diffmap-models-${{ runner.os }}-

      - name: Run DIFFMAP pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python run.py

      - name: Upload results to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<EOF
          from huggingface_hub import HfApi
          import os

          api = HfApi()
          repo_id = "P2SAMAPA/p2-etf-diffmap-results"

          for file in os.listdir("outputs"):
              path = os.path.join("outputs", file)
              print(f"Uploading {file} to HF dataset...")

              api.upload_file(
                  path_or_fileobj=path,
                  path_in_repo=file,
                  repo_id=repo_id,
                  repo_type="dataset",
                  token=os.environ["HF_TOKEN"]
              )
          EOF
